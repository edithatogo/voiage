# line-length = 88 # This is also a global setting, default is 88

[tool.ruff.lint]
select = [
    "F", "E", "W", "I", "C90", "N", "D", "ANN", "S", "B", "A", "PT", "RUF",
    "SIM", "C4", "RET", "SLF", "TRY", "RUF022", "RUF023", "PL", "FURB",
    "UP", "YTT", "ASYNC", "TCH", "PYI", "Q", "FA", "PERF"
]
ignore = [
    "ANN401", "E501", "D100", "D101", "D102", "D103", "D104", "D105", "D107",
    "ANN001", "ANN002", "ANN003", "ANN201", "ANN202", "ANN204",
    "S101", "ANN101", "C901", "PLR0913", "PLR0912", "PLR0915",
    "TRY003", "EM101", "EM102", "FIX002", "TD002", "TD003"
]
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.isort]
known-first-party = ["voiage"]
force-sort-within-sections = true

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.lint.flake8-annotations]
mypy-init-return = true
suppress-dummy-args = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.mypy]
python_version = "3.9"
warn_unused_configs = true
warn_redundant_casts = true
warn_return_any = false
exclude = ["voiage/plot"]
files = ["voiage", "tests"]
[[tool.mypy.overrides]]
module = [
    "matplotlib.*",
    "seaborn.*",
    "SALib.*",
    "typer.*",
    "pandas_stubs.*",
    "sklearn.*",
    "bokeh.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "voiage.*"
disallow_untyped_defs = false
disallow_incomplete_defs = false

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "voiage.plot.*"
ignore_errors = true


[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra -q --cov=voiage --cov-report=term-missing --cov-report=xml --cov-report=html --cov-fail-under=0 --ignore=tests/test_web_api_comprehensive.py --ignore=tests/test_web_api_high_coverage.py --ignore=tests/test_mutation_complexity.py --ignore=tests/test_mutation_complexity_tools.py --ignore=tests/test_integration.py --ignore=tests/test_analysis_comprehensive.py --ignore=tests/test_analysis_high_coverage.py --ignore=tests/test_basic_methods_additional.py --ignore=tests/test_additional_metamodels.py --ignore=tests/test_clinical_trials_comprehensive.py --ignore=tests/test_clinical_trials_final_push.py --ignore=tests/test_clinical_trials_95_percent.py --ignore=tests/test_clinical_trials_enhanced_95.py --ignore=tests/test_clinical_trials_final_95.py --ignore=tests/test_clinical_trials_95_corrected.py --ignore=tests/test_clinical_trials_missing_lines.py --ignore=tests/test_clinical_trials_final_95_percent.py --ignore=tests/test_cli_coverage.py --ignore=tests/test_faulthandler.py --ignore=tests/test_final_metamodel_coverage.py --ignore=tests/test_fluent_api.py --ignore=tests/test_gpu_acceleration_comprehensive.py --ignore=tests/test_health_economics_95_targeted.py --ignore=tests/test_incremental_computation.py --ignore=tests/test_io_comprehensive.py --ignore=tests/test_memory_optimization_comprehensive.py --ignore=tests/test_hta_integration_95_targeted.py --ignore=tests/test_hta_comprehensive.py --ignore=tests/test_hta_enhanced_95.py --ignore=tests/test_hta_final_95_achievement.py --ignore=tests/test_hta_final_95_percent.py --ignore=tests/test_hta_final_95_push.py --ignore=tests/test_hta_integration_95_percent.py --ignore=tests/test_hta_missing_lines.py --ignore=tests/test_hta_simple.py --ignore=tests/test_hta_simplified_coverage.py --ignore=tests/test_hta_super_target_95.py --ignore=tests/test_hta_target_95.py --ignore=tests/test_hta_final_27_lines.py --ignore=tests/test_hta_final_95_achievement_comprehensive.py --ignore=tests/test_multi_domain_enhanced_95.py --ignore=tests/test_multi_domain_missing_lines.py --ignore=tests/test_multi_domain_simple_80.py --ignore=tests/test_multidomain_hta_additional.py --ignore=tests/test_hta_integration_95_targeted_fixed.py --ignore=tests/test_metamodeling_comprehensive.py --ignore=tests/test_metamodels_final.py --ignore=tests/test_metamodels_high_coverage.py --ignore=tests/test_multi_domain_95_targeted.py --ignore=tests/test_multi_domain_95_targeted_fixed.py --ignore=tests/test_property_based.py --ignore=tests/test_schema_comprehensive.py --ignore=tests/test_schema_comprehensive_final.py --ignore=tests/test_schema_high_coverage.py --ignore=tests/test_streaming_data.py --ignore=tests/test_structural_high_coverage.py --ignore=tests/test_syrupy_snapshots.py --ignore=tests/test_schema_comprehensive_fixed.py --ignore=tests/test_active_learning_metamodel.py --ignore=tests/test_adaptive_additional.py --ignore=tests/test_adaptive_comprehensive.py --ignore=tests/test_adaptive.py --ignore=tests/test_cli_comprehensive.py --ignore=tests/test_coverage.py --ignore=tests/test_data_structures.py --ignore=tests/test_decision_analysis_comprehensive.py --ignore=tests/test_decision_analysis.py --ignore=tests/test_deep_evsi_comprehensive.py --ignore=tests/test_deep_evsi.py --ignore=tests/test_economic_evsi_comprehensive.py --ignore=tests/test_economic_evsi.py --ignore=tests/test_environmental_comprehensive.py --ignore=tests/test_environmental.py --ignore=tests/test_evpi_simple.py --ignore=tests/test_evsi_simple.py --ignore=tests/test_evppi_simple.py --ignore=tests/test_financial_comprehensive.py --ignore=tests/test_financial.py --ignore=tests/test_health_economics_final.py --ignore=tests/test_health_economics_fixed.py --ignore=tests/test_health_economics_missing_lines.py --ignore=tests/test_health_economics_targeted.py --ignore=tests/test_hta_comprehensive_95.py --ignore=tests/test_hta_enhanced_95.py --ignore=tests/test_hta_final_95_achievement.py --ignore=tests/test_hta_final_95_percent_final.py --ignore=tests/test_hta_final_95_push.py --ignore=tests/test_hta_simple.py --ignore=tests/test_hta_super_target_95.py --ignore=tests/test_hta_target_95.py --ignore=tests/test_multi_domain_comprehensive.py --ignore=tests/test_multi_domain_final.py --ignore=tests/test_multi_domain_missing_lines.py --ignore=tests/test_multi_domain_simple_80.py --ignore=tests/test_nma_validation_example.py --ignore=tests/test_plotting_comprehensive.py --ignore=tests/test_plotting.py --ignore=tests/test_portfolio_comprehensive.py --ignore=tests/test_portfolio.py --ignore=tests/test_sampling_comprehensive.py --ignore=tests/test_sampling.py --ignore=tests/test_sensitivity_comprehensive.py --ignore=tests/test_sensitivity.py --ignore=tests/test_sequential_comprehensive.py --ignore=tests/test_sequential.py --ignore=tests/test_structural_comprehensive.py --ignore=tests/test_structural.py --ignore=tests/test_utils_comprehensive.py --ignore=tests/test_utils.py"
testpaths = ["tests"]
python_files = "test_*.py"
markers = [
    "integration: marks tests as integration tests (deselect with '-m \"not integration\"')",
    "e2e: marks tests as end-to-end tests (deselect with '-m \"not e2e\"')",
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "benchmark: marks tests as benchmark tests"
]

[tool.coverage.run]
source = ["voiage"]
omit = [
    "voiage/__main__.py",
    "voiage/cli.py",
    "*/__init__.py",
    "voiage/plot/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

[tool.mutmut]
paths_to_mutate = "voiage/"
tests_dir = "tests/"
runner = "pytest -x --no-cov"
fail_under = 80

[tool.ty]
python_version = "3.9"
warn_unused_configs = true
warn_redundant_casts = true
files = ["voiage", "tests"]
exclude = ["voiage/plot"]

[[tool.ty.overrides]]
module = [
    "matplotlib.*",
    "seaborn.*",
    "SALib.*",
    "typer.*",
    "pandas_stubs.*",
    "sklearn.*",
    "bokeh.*",
]
ignore_missing_imports = true

[[tool.ty.overrides]]
module = "voiage.*"
disallow_untyped_defs = false
disallow_incomplete_defs = false

[[tool.ty.overrides]]
module = "tests.*"
ignore_errors = true

[[tool.ty.overrides]]
module = "voiage.plot.*"
ignore_errors = true

[tool.semantic_release]
version_variables = ["pyproject.toml:project.version"]
version_source = "tag"
upload_to_pypi = true
upload_to_release = true
commit_message = "chore(release): {version} [skip ci]"
commit_author = "github-actions[bot] <actions@github.com>"
branch = "main"
changelog_file = "CHANGELOG.md"

[tool.bandit]
skips = ["B101"]

[tool.taskipy.tasks]
test = "uv run pytest tests/ -m 'not integration and not e2e and not benchmark' --cov=voiage --cov-report=term-missing"
test-integration = "uv run pytest tests/ -m 'integration' --cov=voiage --cov-append"
test-e2e = "uv run pytest tests/ -m 'e2e'"
test-all = "uv run pytest tests/ --cov=voiage --cov-report=term-missing --cov-report=html"
lint = "uv run ruff check voiage tests"
format = "uv run ruff format voiage tests"
typecheck = "uv run ty check voiage tests"
security = "uv run bandit -r voiage -s B101 -c pyproject.toml"
profile = "uv run scalene --cli voiage/profile_scalene.py"
mutmut = "uv run mutmut run --paths-to-mutate voiage/"
benchmark = "uv run pytest tests/ -m 'benchmark' --benchmark-only"
docs = "uv run sphinx-build -W -b html docs docs/_build/html"
precommit = "uv run pre-commit run --all-files"
check = "uv run ruff check voiage tests && uv run ruff format voiage tests --check && uv run ty check voiage tests && uv run pytest tests/ -m 'not integration and not e2e'"