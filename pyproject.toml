# pyproject.toml for voiage

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "voiage"
version = "0.2.0" # Target version for this phase
description = "A Python library for Value of Information analysis."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [
  { name = "voiage Contributors", email = "info@example.com" },
]
keywords = [
    "voi", "value of information", "evpi", "evppi", "evsi", "enbs",
    "decision analysis", "health economics", "uncertainty quantification",
    "bayesian analysis", "cost-effectiveness"
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "numpy>=1.20,<2.0",
    "scipy>=1.7,<1.15",
    "pandas>=1.3,<3.0",
    "xarray>=0.19,<2025.0",
    "numpyro>=0.14,<0.20",
    "jax>=0.4.33,<0.6",
    "scikit-learn>=1.0,<2.0",
    "statsmodels>=0.13,<1.0",
    "matplotlib>=3.4,<4.0",
    "seaborn>=0.11,<1.0",
    "typer[all]>=0.9,<1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0,<9.0",
    "pytest-cov>=5.0,<7.0",
    "pytest-xdist>=3.0,<4.0",
    "pytest-benchmark>=4.0,<6.0",
    "pytest-integration>=0.2,<0.3",
    "hypothesis>=6.0,<7.0",
    "mutmut>=2.0,<3.0",
    "scalene>=1.5,<2.0",
    "ruff>=0.9.0,<1.0",
    "ty>=0.0.1,<1.0",
    "types-setuptools",
    "types-requests",
    "bandit>=1.7.6,<2.0",
    "sphinx>=7.0,<8.0",
    "sphinx-rtd-theme>=1.0,<2.0",
    "sphinx-autodoc-typehints>=1.12,<2.0",
    "jupyterlab>=3.0,<5.0",
    "ipykernel",
    "pre-commit>=4.0,<5.0",
    "vulture>=2.0,<3.0",
    "taskipy>=1.0,<2.0",
]
plotting = ["matplotlib>=3.4", "seaborn>=0.11"]
deep_learning = ["torch>=1.9,<3.0"]

[project.urls]
Homepage = "https://github.com/edithatogo/voiage"
Documentation = "https://edithatogo.github.io/voiage" # Updated to GitHub Pages
Repository = "https://github.com/edithatogo/voiage.git"
Changelog = "https://github.com/doughnut/voiage/blob/main/CHANGELOG.md"
Issues = "https://github.com/doughnut/voiage/issues"

[project.scripts]
voiage = "voiage.cli:app"

# --- Tool Configurations ---

