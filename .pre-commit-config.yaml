# .pre-commit-config.yaml for voiage
# SOTA pre-commit hooks for maximum automation and code quality

default_language_version:
  python: python3.10

repos:
# Standard file checks
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
    args: [--allow-multiple-documents]
  - id: check-toml
  - id: check-json
  - id: check-ast
  - id: check-docstring-first
  - id: check-merge-conflict
  - id: debug-statements
  - id: detect-private-key
  - id: name-tests-test
    args: ['--pytest-test-first']
  - id: mixed-line-ending
    args: ['--fix=lf']
  - id: check-case-conflict
  - id: check-symlinks

# Ruff: All-in-one linting and formatting
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.9.0
  hooks:
  - id: ruff
    name: ruff (lint)
    args: [--fix, --exit-non-zero-on-fix]
  - id: ruff-format
    name: ruff (format)

# Ty: Fast static type checker (Astral)
- repo: https://github.com/astral-sh/ty
  rev: v0.0.56
  hooks:
  - id: ty
    name: ty (type check)
    args:
    - --python-version=3.10
    - --ignore=invalid-argument-type
    - --ignore=invalid-assignment
    - --ignore=unresolved-attribute
    - --ignore=unresolved-import
    - --ignore=no-matching-overload
    - --ignore=unsupported-operator
    - --ignore=call-non-callable
    - --ignore=not-iterable
    - --ignore=not-subscriptable
    - --ignore=invalid-return-type
    - --ignore=invalid-method-override
    - --ignore=unused-type-ignore-comment
    - --ignore=redundant-cast
    additional_dependencies:
    - numpy>=1.20
    - pandas>=1.3
    - xarray>=0.19
    - scikit-learn>=1.0
    - statsmodels>=0.13
    - matplotlib>=3.4
    - seaborn>=0.11
    - typer>=0.9
    - numpyro>=0.13
    - jax>=0.4

# Commit message linting
- repo: https://github.com/compilerla/conventional-pre-commit
  rev: v4.0.0
  hooks:
  - id: conventional-pre-commit
    stages: [commit-msg]
    args: []

# Shell script linting
- repo: https://github.com/shellcheck-py/shellcheck-py
  rev: v0.10.0.1
  hooks:
  - id: shellcheck
    args: ["-x"]

# pygrep-hooks: Python-specific checks
- repo: https://github.com/pre-commit/pygrep-hooks
  rev: v1.10.0
  hooks:
  - id: python-check-blanket-noqa
  - id: python-no-eval
  - id: python-no-log-warn

# Tox formatting
- repo: https://github.com/tox-dev/tox-ini-fmt
  rev: "1.5.0"
  hooks:
  - id: tox-ini-fmt
    args: ["tox.ini"]
