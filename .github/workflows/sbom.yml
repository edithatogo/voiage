name: Supply-chain assurance

on:
  pull_request:
  release:
    types: [published]
  schedule:
    - cron: "43 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    name: Reproducible build and SBOM
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        fetch-depth: 0
        persist-credentials: false

    - name: Assert and record exact source head
      env:
        EXPECTED_SOURCE_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
      run: |
        tested_head="$(git rev-parse HEAD)"
        echo "tested_head=${tested_head}"
        test "${tested_head}" = "${EXPECTED_SOURCE_HEAD}"
        printf '### Exact source head\n\n`%s`\n' "${tested_head}" >> "${GITHUB_STEP_SUMMARY}"

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "0.11.29"
        enable-cache: false

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync --frozen --extra dev

    - name: Initialize retained assurance directory
      run: mkdir -p .assurance

    - name: Verify reproducible distributions
      run: uv run python scripts/reproducible_build.py . --output .assurance/reproducible-build.json --dist-dir .assurance/dist

    - name: Generate CycloneDX SBOM
      run: |
        uv export --frozen --no-dev --no-emit-project --format requirements-txt --output-file .assurance/release-requirements.txt
        uv venv .assurance/sbom-env --python 3.14
        uv pip install --python .assurance/sbom-env/bin/python --require-hashes -r .assurance/release-requirements.txt
        uv pip install --python .assurance/sbom-env/bin/python --no-deps .assurance/dist/*.whl
        uvx --from cyclonedx-bom==7.3.0 cyclonedx-py environment .assurance/sbom-env --pyproject pyproject.toml --mc-type library --output-reproducible --of JSON -o .assurance/sbom.cdx.json

    - name: Retain vulnerability evidence
      run: uvx --from pip-audit==2.10.1 pip-audit -r .assurance/release-requirements.txt --format=json --output=.assurance/pip-audit.json

    - name: Upload SBOM artifacts
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: supply-chain-assurance
        path: .assurance/
        include-hidden-files: true
        if-no-files-found: error
        retention-days: 90
