name: Supply-chain assurance

on:
  pull_request:
  release:
    types: [published]
  schedule:
    - cron: "43 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    name: Reproducible build and SBOM
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "0.11.29"
        enable-cache: false

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync --frozen --extra dev

    - name: Verify reproducible distributions
      run: uv run python scripts/reproducible_build.py . --output .assurance/reproducible-build.json

    - name: Generate CycloneDX SBOM
      run: |
        uv export --frozen --no-dev --no-emit-project --format requirements-txt --output-file .assurance/release-requirements.txt
        uvx --from cyclonedx-bom==7.3.0 cyclonedx-py requirements .assurance/release-requirements.txt --of JSON -o .assurance/sbom.cdx.json

    - name: Retain vulnerability evidence
      run: uvx --from pip-audit==2.10.1 pip-audit --format=json --output=.assurance/pip-audit.json

    - name: Upload SBOM artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: supply-chain-assurance
        path: .assurance/
        include-hidden-files: true
        if-no-files-found: error
        retention-days: 90
