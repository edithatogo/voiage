name: Dependency Assurance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * 1'

permissions:
  contents: read

jobs:
  stable-frozen:
    name: Stable Frozen Lock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install pinned uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.29"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14"

      - name: Install the immutable stable environment
        run: uv sync --frozen --extra ci

      - name: Verify immutable lock
        run: uv lock --check

      - name: Run stable assurance contracts
        run: >-
          uv run --frozen --no-sync pytest
          tests/test_contract_bundle.py
          tests/test_logging_contract.py
          tests/test_numerical_reference_cases.py
          --no-cov -q

  latest-compatible-frontier:
    name: Latest Compatible and Experimental Observation
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    runs-on: ubuntu-latest
    env:
      UV_MALWARE_CHECK: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install pinned uv resolver
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.29"
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14"

      - name: Resolve latest versions within declared constraints
        run: |
          uv lock --upgrade
          uv sync --extra ci --extra experimental
          uv tree --depth 1

      - name: Run frontier assurance contracts
        run: >-
          uv run --no-sync pytest
          tests/test_contract_bundle.py
          tests/test_logging_contract.py
          tests/test_numerical_reference_cases.py
          --no-cov -q

      - name: Record frontier drift
        run: |
          git diff -- uv.lock > dependency-frontier.patch
          uv run --no-sync python scripts/dependency_frontier.py . --strict

      - name: Upload observational frontier evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dependency-frontier-observation
          path: |
            dependency-frontier.patch
            .conductor/local/dependency_frontier.json
            .conductor/local/dependency_frontier.md
          if-no-files-found: warn
