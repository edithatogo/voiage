name: Update Conda-Forge Feedstock

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Published GitHub release tag to submit to conda-forge (for example, v1.0.0)
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-feedstock:
    name: Update Conda-Forge Feedstock
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_tag, 'v'))

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.14'

    - name: Get release info
      id: release
      run: |
        if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
          tag="$RELEASE_TAG_INPUT"
        else
          tag="${GITHUB_REF#refs/tags/}"
        fi
        version="${tag#v}"
        echo "tag=$tag" >> "$GITHUB_OUTPUT"
        echo "version=$version" >> "$GITHUB_OUTPUT"
      env:
        RELEASE_TAG_INPUT: ${{ inputs.release_tag }}

    - name: Download source and compute SHA256
      id: source
      run: |
        python -m pip download --no-deps --no-binary=:all: "voiage==${STEPS_RELEASE_OUTPUTS_VERSION}" -d "$RUNNER_TEMP/sdist"
        source_file="$(find "$RUNNER_TEMP/sdist" -name '*.tar.gz' -o -name '*.zip' | head -n 1)"
        sha256=$(sha256sum "$source_file" | awk '{print $1}')
        echo "sha256=$sha256" >> $GITHUB_OUTPUT
      env:
        STEPS_RELEASE_OUTPUTS_VERSION: ${{ steps.release.outputs.version }}

    - name: Update conda-recipe/meta.yaml
      run: |
        python - <<'PY'
        from pathlib import Path
        import re
        import os

        meta = Path("conda-recipe/meta.yaml")
        text = meta.read_text()
        text = re.sub(
            r'{% set version = ".*?" %}',
            '{% set version = "' + os.environ["RELEASE_VERSION"] + '" %}',
            text,
        )
        text = re.sub(
            r"sha256: [0-9a-fA-F_]+",
            "sha256: " + os.environ["RELEASE_SHA256"],
            text,
        )
        meta.write_text(text)
        PY
      env:
        RELEASE_VERSION: ${{ steps.release.outputs.version }}
        RELEASE_SHA256: ${{ steps.source.outputs.sha256 }}

    - name: Create feedstock PR
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
      with:
        token: ${{ secrets.CONDA_FORGE_TOKEN }}
        title: "Update to v${{ steps.release.outputs.version }}"
        body: |
          Automated update to v${{ steps.release.outputs.version }}

          - Version: ${{ steps.release.outputs.version }}
          - SHA256: ${{ steps.source.outputs.sha256 }}
          - Source: https://github.com/${{ github.repository }}/releases/tag/${{ steps.release.outputs.tag }}
        branch: update-conda-${{ steps.release.outputs.version }}
        base: main
        commit-message: "chore(conda): Update to v${{ steps.release.outputs.version }}"
        labels: automerge
