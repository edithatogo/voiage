name: GitHub Actions Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "31 4 * * 1"

permissions:
  contents: read

jobs:
  zizmor:
    name: Audit GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Audit workflows (attempt 1)
        id: audit_attempt_1
        uses: zizmorcore/zizmor-action@f52a838cfabf134edcbaa7c8b3677dde20045018
        continue-on-error: true
        with:
          advanced-security: true
      - name: Audit workflows (attempt 2)
        id: audit_attempt_2
        if: steps.audit_attempt_1.outcome != 'success'
        uses: zizmorcore/zizmor-action@f52a838cfabf134edcbaa7c8b3677dde20045018
        continue-on-error: true
        with:
          advanced-security: true
      - name: Audit workflows (attempt 3)
        id: audit_attempt_3
        if: steps.audit_attempt_1.outcome != 'success' && steps.audit_attempt_2.outcome != 'success'
        uses: zizmorcore/zizmor-action@f52a838cfabf134edcbaa7c8b3677dde20045018
        continue-on-error: true
        with:
          advanced-security: true
      - name: Fail if all workflow-audit attempts failed
        if: steps.audit_attempt_1.outcome != 'success' && steps.audit_attempt_2.outcome != 'success' && steps.audit_attempt_3.outcome != 'success'
        run: exit 1
