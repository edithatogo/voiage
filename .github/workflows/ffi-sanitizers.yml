name: FFI sanitizers

on:
  pull_request:
    paths:
      - ".github/workflows/ffi-sanitizers.yml"
      - "rust/**"
      - "scripts/run_ffi_sanitizers.sh"
      - "tests/ffi/**"
      - "tests/test_ffi_sanitizer_contract.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/ffi-sanitizers.yml"
      - "rust/**"
      - "scripts/run_ffi_sanitizers.sh"
      - "tests/ffi/**"
      - "tests/test_ffi_sanitizer_contract.py"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ffi-sanitizers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-abi-sanitizers:
    name: C consumer ASan UBSan LSan with ASan-instrumented Rust
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install pinned nightly sanitizer toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: nightly-2026-07-01
          components: rust-src
      - name: Run real C consumer with sanitizers
        env:
          VOIAGE_SANITIZER_TOOLCHAIN: nightly-2026-07-01
        run: bash scripts/run_ffi_sanitizers.sh
