name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run profiling weekly on Monday
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  prose-lint:
    name: Vale Prose Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.22"

    - name: Install Vale
      run: |
        go install github.com/errata-ai/vale/v2/cmd/vale@latest
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

    - name: Run Vale
      run: uv run bash scripts/vale_prose.sh

  frontier-contract:
    name: Frontier Contract Validation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: uv sync --extra ci --extra dev

    - name: Validate frontier contracts
      run: uv run python scripts/validate_frontier_contract.py

  version-sync:
    name: Version Synchronization Validation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: uv sync --extra ci --extra dev

    - name: Validate version synchronization
      run: uv run tox -e version-sync

  # Fast linting job
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: uv sync --extra ci --extra dev

    - name: Run Ruff
      run: uv run ruff check voiage tests --output-format=github --ignore=FA100,FA102

    - name: Run Ruff format check
      run: uv run ruff format voiage tests --check

    - name: Run Bandit security check
      run: uv run bandit -r voiage -s B101,B110,B405,B314 -c pyproject.toml

    - name: Check for dead code
      run: uv run vulture voiage --min-confidence 80 || true

  # Unit tests
  test-unit:
    name: Unit Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python ${{ matrix.python }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}

    - name: Install dependencies
      run: uv sync --extra ci

    - name: Run unit tests with coverage
      run: |
        uv run pytest tests/ \
          -m "not integration and not e2e and not benchmark" \
          --cov=voiage \
          --cov-fail-under=0 \
          --cov-report=xml \
          --cov-report=term-missing \
          --numprocesses=auto \
          -v
      env:
        CI: true

    - name: Upload coverage to Codecov
      if: matrix.python == '3.11'
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: uv sync --extra ci

    - name: Verify coverage threshold
      run: uv run --with tox tox -e coverage_report

  benchmark-regression:
    name: Benchmark Regression Checks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: uv sync --extra ci

    - name: Run benchmark regression checks
      run: |
        uv run pytest tests/test_core_metrics_regression.py tests/benchmarks/test_benchmark_regression.py \
          -q \
          --no-cov
      env:
        CI: true

  # Integration tests
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: uv sync --extra ci

    - name: Run integration tests
      run: |
        uv run pytest tests/ \
          -m "integration" \
          --no-cov \
          -v
      env:
        CI: true

  # End-to-end tests
  test-e2e:
    name: E2E Tests (CLI)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install voiage
      run: uv sync --extra ci --extra dev

    - name: Run E2E CLI tests
      run: |
        uv run pytest tests/ \
          -m "e2e" \
          --no-cov \
          -v
      env:
        CI: true

  # Mutation testing (weekly)
  test-mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: uv sync --extra ci --extra dev

    - name: Run mutation testing
      run: |
        uv run mutmut run --paths-to-mutate voiage/
        uv run mutmut results
      env:
        CI: true

  # Performance profiling (weekly)
  profile:
    name: Performance Profiling
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run Scalene profiler
      run: |
        uv run scalene --cli --outfile profile_results.txt voiage/analysis.py
        cat profile_results.txt
      env:
        CI: true

  # Documentation build
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Build documentation
      run: uv run sphinx-build -b html docs docs/_build/html
