name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run profiling weekly on Monday
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  prose-lint:
    name: Vale Prose Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "latest"
        enable-cache: true
        cache-suffix: ${{ github.job }}-${{ matrix.python || 'base' }}
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.14"

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
      with:
        cache: false
        go-version: "1.22"

    - name: Install Vale
      run: |
        go install github.com/errata-ai/vale/v2/cmd/vale@latest
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

    - name: Run Vale
      run: uv run bash scripts/vale_prose.sh

  frontier-contract:
    name: Frontier Contract Validation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "latest"
        enable-cache: true
        cache-suffix: ${{ github.job }}-${{ matrix.python || 'base' }}
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.14"

    - name: Install dependencies
      run: uv sync --extra ci --extra dev

    - name: Validate frontier contracts
      run: uv run python scripts/validate_frontier_contract.py

  version-sync:
    name: Version Synchronization Validation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "latest"
        enable-cache: true
        cache-suffix: ${{ github.job }}-${{ matrix.python || 'base' }}
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.14"

    - name: Install dependencies
      run: uv sync --extra ci --extra dev

    - name: Validate version synchronization
      run: uv run tox -e version-sync

  # Fast linting job
  repository-harness:
    name: Repository Harness
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "latest"
        enable-cache: true
        cache-suffix: ${{ github.job }}-${{ matrix.python || 'base' }}
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.14"

    - name: Install dependencies
      run: uv sync --extra ci

    - name: Run repository harness
      run: uv run python scripts/repo_harness.py

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "latest"
        enable-cache: true
        cache-suffix: ${{ github.job }}-${{ matrix.python || 'base' }}
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync --extra ci --extra dev

    - name: Run Ruff
      run: uv run ruff check voiage tests --output-format=github --ignore=FA100,FA102,UP,TC,RUF022,RUF100

    - name: Run Ruff format check
      run: uv run ruff format voiage tests --check

    - name: Run Bandit security check
      run: uv run bandit -r voiage -s B101,B110,B405,B314 -c pyproject.toml

    - name: Check for dead code
      run: uv run vulture voiage --min-confidence 80 || true

  # Unit tests
  test-unit:
    name: Unit Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.14"]
      fail-fast: false
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "latest"
        enable-cache: true
        cache-suffix: ${{ github.job }}-${{ matrix.python || 'base' }}
        cache-dependency-glob: "uv.lock"

    - name: Set up Python ${{ matrix.python }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: ${{ matrix.python }}

    - name: Install dependencies
      run: uv sync --extra ci

    - name: Run unit tests with coverage
      run: |
        uv run pytest tests/ \
          -m "not integration and not e2e and not benchmark" \
          --cov=voiage \
          --cov-fail-under=0 \
          --cov-report=xml \
          --cov-report=term-missing \
          --numprocesses=auto \
          -v
      env:
        CI: true

    - name: Upload coverage to Codecov
      if: matrix.python == '3.14'
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "latest"
        enable-cache: true
        cache-suffix: ${{ github.job }}-${{ matrix.python || 'base' }}
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.14"

    - name: Install dependencies
      run: uv sync --extra ci

    - name: Verify coverage threshold
      run: uv run --with tox tox -e coverage_report

  free-threaded-observation:
    name: Python 3.14t Observation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "latest"
        enable-cache: true
        cache-suffix: ${{ github.job }}
        cache-dependency-glob: "uv.lock"

    - name: Set up free-threaded Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.14t"

    - name: Observe minimal free-threaded Arrow compatibility
      id: free_threaded_probe
      continue-on-error: true
      run: >-
        uv run --no-project --no-build
        --with pyarrow==25.0.0
        --with polars==1.42.1
        python scripts/free_threaded_arrow_probe.py
    - name: Record ecosystem readiness
      if: steps.free_threaded_probe.outcome != 'success'
      run: |
        echo "::notice::Python 3.14t Arrow wheels are not yet available for this probe."
        echo "Python 3.14t Arrow compatibility is currently observational." >> "$GITHUB_STEP_SUMMARY"

  benchmark-regression:
    name: Benchmark Regression Checks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "latest"
        enable-cache: true
        cache-suffix: ${{ github.job }}-${{ matrix.python || 'base' }}
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.14"

    - name: Install dependencies
      run: uv sync --extra ci

    - name: Run benchmark regression checks
      run: |
        uv run pytest tests/test_core_metrics_regression.py tests/benchmarks/test_benchmark_regression.py \
          -q \
          --no-cov
        uv run python scripts/benchmark_perspective_interchange.py
        uv run python scripts/perspective_interchange_manifest.py --check
        uv run python scripts/validate_vop_compatibility.py
      env:
        CI: true

  # Integration tests
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "latest"
        enable-cache: true
        cache-suffix: ${{ github.job }}-${{ matrix.python || 'base' }}

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync --extra ci

    - name: Run integration tests
      run: |
        uv run pytest tests/ \
          -m "integration" \
          --no-cov \
          -v
      env:
        CI: true

  # End-to-end tests
  test-e2e:
    name: E2E Tests (CLI)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "latest"
        enable-cache: true
        cache-suffix: ${{ github.job }}-${{ matrix.python || 'base' }}

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.14'

    - name: Install voiage
      run: uv sync --extra ci --extra dev

    - name: Run E2E CLI tests
      run: |
        uv run pytest tests/ \
          -m "e2e" \
          --no-cov \
          -v
      env:
        CI: true

  # Mutation testing (weekly)
  test-mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "latest"
        enable-cache: true
        cache-suffix: ${{ github.job }}-${{ matrix.python || 'base' }}

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync --extra ci --extra dev

    - name: Run mutation testing
      run: |
        uv run mutmut run --paths-to-mutate voiage/
        uv run mutmut results
      env:
        CI: true

  # Performance profiling (weekly)
  profile:
    name: Performance Profiling
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "latest"
        enable-cache: true
        cache-suffix: ${{ github.job }}-${{ matrix.python || 'base' }}

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run Scalene profiler
      run: |
        uv run scalene --cli --outfile profile_results.txt voiage/analysis.py
        cat profile_results.txt
      env:
        CI: true

  # Documentation build
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: '22'

    - name: Install pnpm
      uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288
      with:
        version: '10'

    - name: Install documentation dependencies
      working-directory: docs/astro-site
      run: pnpm install --frozen-lockfile

    - name: Check documentation
      working-directory: docs/astro-site
      run: pnpm run check

    - name: Build documentation
      working-directory: docs/astro-site
      run: pnpm run build
