name: Polyglot Bindings CI

on:
  pull_request:
    branches: [main]
    paths:
      - "bindings/**"
      - "r-package/**"
      - ".github/workflows/bindings-ci.yml"
      - "specs/core-api/fixtures/**"
      - "specs/numerical-reference/**"
  push:
    branches: [main]
    paths:
      - "bindings/**"
      - "r-package/**"
      - ".github/workflows/bindings-ci.yml"
      - "specs/core-api/fixtures/**"
      - "specs/numerical-reference/**"

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/typescript
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm run check
      - run: npm run pack:dry-run

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/go
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: "1.25"
      - run: go test ./...
      - run: go vet ./...

  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/rust
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          components: clippy,rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --locked
      - run: cargo doc --no-deps --locked
      - run: cargo package --locked --allow-dirty

  julia:
    name: Julia
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/julia
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9
        with:
          version: "1.11"
      - run: julia --project=. -e 'using Pkg; Pkg.test()'

  dotnet:
    name: .NET 11
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/dotnet
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: "11.0.x"
          dotnet-quality: "preview"
      - run: dotnet build src/Voiage.Core/Voiage.Core.csproj --configuration Release
      - run: dotnet run --project tests/Voiage.Core.Tests/Voiage.Core.Tests.csproj --configuration Release
      - run: dotnet pack src/Voiage.Core/Voiage.Core.csproj --configuration Release --no-build

  r:
    name: R
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: r-package/voiageR
    env:
      VOIAGE_NUMERICAL_REFERENCE: ${{ github.workspace }}/specs/numerical-reference/v1/evpi-cases.json
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6
      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6
        with:
          working-directory: r-package/voiageR
          extra-packages: any::rcmdcheck
      - uses: r-lib/actions/setup-tinytex@d3c5be51b12e724e68f33216ca3c148b66d5f0b6
      - run: R CMD build .
      - run: Rscript -e 'rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "warning")'
      - name: Build PDF manual
        run: Rscript tools/build-manual.R . "$RUNNER_TEMP/voiageR-manual.pdf"
