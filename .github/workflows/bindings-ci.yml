name: Retained Bindings CI

on:
  pull_request:
    branches: [main]
    paths:
      - "bindings/julia/**"
      - "r-package/**"
      - "rust/**"
      - "tests/ffi/**"
      - ".github/workflows/bindings-ci.yml"
      - "specs/core-api/fixtures/**"
      - "specs/numerical-reference/**"
  push:
    branches: [main]
    paths:
      - "bindings/julia/**"
      - "r-package/**"
      - "rust/**"
      - "tests/ffi/**"
      - ".github/workflows/bindings-ci.yml"
      - "specs/core-api/fixtures/**"
      - "specs/numerical-reference/**"

permissions:
  contents: read

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Assert and record exact source head
        env:
          EXPECTED_SOURCE_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          tested_head="$(git rev-parse HEAD)"
          test "${tested_head}" = "${EXPECTED_SOURCE_HEAD}"
          printf "### Exact source head\n\n\`%s\`\n" "${tested_head}" >> "${GITHUB_STEP_SUMMARY}"
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
          components: clippy,rustfmt
      - working-directory: rust
        run: cargo fmt --all --check
      - working-directory: rust
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - working-directory: rust
        run: cargo test --workspace --all-features --locked

  rust-msrv:
    name: Rust workspace (MSRV 1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: "1.85"
      - working-directory: rust
        run: cargo check --workspace --all-targets --all-features --locked

  julia:
    name: Julia binding
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/julia
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Assert and record exact source head
        env:
          EXPECTED_SOURCE_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          tested_head="$(git rev-parse HEAD)"
          test "${tested_head}" = "${EXPECTED_SOURCE_HEAD}"
          printf "### Exact source head\n\n\`%s\`\n" "${tested_head}" >> "${GITHUB_STEP_SUMMARY}"
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
      - name: Build the Rust C ABI used by Julia
        working-directory: rust
        run: cargo build --release --locked --package voiage-ffi
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32
        with:
          version: "1.11"
      - name: Verify packaged EVPI fixture matches the canonical reference
        run: >-
          julia --project=. -e
          'using Pkg;
          Pkg.instantiate();
          using JSON;
          packaged = JSON.parsefile("test/fixtures/evpi-cases.json");
          canonical = JSON.parsefile("../../specs/numerical-reference/v1/evpi-cases.json");
          @assert packaged == canonical'
      - name: Test a standalone Julia package copy
        shell: bash
        run: |
          standalone_dir="${RUNNER_TEMP}/voiage-julia-standalone"
          mkdir -p "${standalone_dir}"
          git archive HEAD:bindings/julia | tar -x -C "${standalone_dir}"
          STANDALONE_DIR="${standalone_dir}" julia --project="${standalone_dir}" -e '
            using Pkg
            project = Pkg.project()
            @assert project.name == "Voiage"
            @assert string(project.uuid) == "8c7ad020-41fd-4d68-9c3f-5d4e11c48f1f"
            Pkg.instantiate()
            Pkg.test("Voiage")
          '
        env:
          VOIAGE_FFI_LIBRARY: ${{ github.workspace }}/rust/target/release/libvoiage_ffi.so

  r:
    name: R binding
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: r-package/voiageR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Assert and record exact source head
        env:
          EXPECTED_SOURCE_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          tested_head="$(git rev-parse HEAD)"
          test "${tested_head}" = "${EXPECTED_SOURCE_HEAD}"
          printf "### Exact source head\n\n\`%s\`\n" "${tested_head}" >> "${GITHUB_STEP_SUMMARY}"
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
      - name: Build the Rust C ABI used by R
        working-directory: rust
        run: cargo build --release --locked --package voiage-ffi
      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6
      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6
        with:
          extra-packages: any::rcmdcheck
          working-directory: r-package/voiageR
      - uses: r-lib/actions/setup-tinytex@d3c5be51b12e724e68f33216ca3c148b66d5f0b6
      - run: R CMD build .
      - run: Rscript tools/build-manual.R
      - run: Rscript -e 'rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "warning")'
        env:
          VOIAGE_FFI_LIBRARY: ${{ github.workspace }}/rust/target/release/libvoiage_ffi.so

  r-native:
    name: R installed native smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            library: libvoiage_ffi.so
          - os: macos-latest
            library: libvoiage_ffi.dylib
          - os: windows-latest
            library: voiage_ffi.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
      - name: Build the Rust C ABI used by R
        working-directory: rust
        run: cargo build --release --locked --package voiage-ffi
      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6
      - name: Install the R source package
        run: >-
          Rscript -e
          "install.packages('r-package/voiageR', repos = NULL, type = 'source')"
      - name: Call the installed Rust EVPI path
        env:
          VOIAGE_FFI_LIBRARY: ${{ github.workspace }}/rust/target/release/${{ matrix.library }}
        run: >-
          Rscript -e
          "library(voiageR);
          value <- evpi(matrix(c(0, 1, 2, 0), nrow = 2, byrow = TRUE));
          stopifnot(isTRUE(all.equal(value, 0.5, tolerance = 1e-12)))"
