name: Polyglot Bindings CI

on:
  pull_request:
    branches: [main]
    paths:
      - "bindings/**"
      - "r-package/**"
      - ".github/workflows/bindings-ci.yml"
      - "specs/core-api/fixtures/**"
  push:
    branches: [main]
    paths:
      - "bindings/**"
      - "r-package/**"
      - ".github/workflows/bindings-ci.yml"
      - "specs/core-api/fixtures/**"

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/typescript
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm run check
      - run: npm run pack:dry-run

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/go
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - run: go test ./...
      - run: go vet ./...

  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/rust
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo package --allow-dirty

  julia:
    name: Julia
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/julia
    steps:
      - uses: actions/checkout@v5
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"
      - run: julia --project=. -e 'using Pkg; Pkg.test()'

  dotnet:
    name: .NET 11
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/dotnet
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "11.0.x"
          dotnet-quality: "preview"
      - run: dotnet build src/Voiage.Core/Voiage.Core.csproj --configuration Release
      - run: dotnet run --project tests/Voiage.Core.Tests/Voiage.Core.Tests.csproj --configuration Release
      - run: dotnet pack src/Voiage.Core/Voiage.Core.csproj --configuration Release --no-build

  r:
    name: R
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: r-package/voiageR
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r-package/voiageR
          extra-packages: any::rcmdcheck
      - run: R CMD build .
      - run: Rscript -e 'rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "warning")'
