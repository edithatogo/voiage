name: Deploy Documentation

on:
  push:
    branches: [ main ]
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false

    - name: Setup Pages
      uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      # zizmor: ignore[cache-poisoning] -- no setup-node cache input is enabled;
      # the workflow uses the lockfile-keyed cache action below in lookup-only mode.
      with:
        node-version: '22'

    - name: Install pnpm
      uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288
      with:
        version: '10'

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('docs/astro-site/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-
        lookup-only: true

    - name: Install dependencies
      working-directory: docs/astro-site
      run: pnpm install --frozen-lockfile

    - name: Build documentation
      working-directory: docs/astro-site
      run: pnpm run build

    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
      with:
        path: 'docs/astro-site/dist'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
