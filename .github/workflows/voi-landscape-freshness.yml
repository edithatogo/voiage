name: VOI landscape freshness

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: voi-landscape-freshness
  cancel-in-progress: false

jobs:
  freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.13"
      - name: Enforce the review deadline
        run: python scripts/validate_voi_landscape_freshness.py
      - name: Verify generated evidence
        run: |
          python scripts/generate_method_evidence_registry.py --check
          python scripts/generate_method_implementation_evidence.py --check
          python scripts/generate_upstream_feature_evidence.py --check
          python scripts/generate_voi_gap_report.py --check
          python scripts/generate_voi_feature_matrix.py --check
          python scripts/generate_scientific_freeze_candidate.py --check
