name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing signed release tag to stage or publish"
        required: true
        type: string
      publish:
        description: "Publish the verified private draft to TestPyPI, PyPI, and GitHub"
        required: false
        type: boolean
        default: false
      expected_wheel_sha256:
        description: "Reviewed SHA-256 of the staged wheel (required when publishing)"
        required: false
        type: string
      expected_sdist_sha256:
        description: "Reviewed SHA-256 of the staged sdist (required when publishing)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  stage:
    name: Build and Stage Private Draft
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        fetch-depth: 0
        ref: ${{ inputs.release_tag || github.ref }}
        persist-credentials: false

    - name: Validate exact signed remote release tag
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        APPROVED_TAGGER_EMAIL: ${{ vars.RELEASE_TAGGER_EMAIL }}
      run: |
        set -euo pipefail
        [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
        remote_oid="$(git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" | cut -f1)"
        test "$remote_oid" = "$(git rev-parse "refs/tags/$RELEASE_TAG")"
        test "$(git cat-file -t "$RELEASE_TAG")" = tag
        test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$(git rev-parse HEAD)"
        test -n "$APPROVED_TAGGER_EMAIL"
        mkdir -p .assurance
        gh api "repos/${GITHUB_REPOSITORY}/git/tags/$remote_oid" > .assurance/tag-verification.json
        jq -e '.verification.verified == true' .assurance/tag-verification.json >/dev/null
        test "$(jq -r '.tagger.email' .assurance/tag-verification.json)" = "$APPROVED_TAGGER_EMAIL"

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "0.11.29"
        enable-cache: false

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync --frozen --extra dev

    - name: Build package
      run: uv run python scripts/reproducible_build.py . --output .assurance/reproducible-build.json --dist-dir dist

    - name: Verify distributions
      run: uv run twine check dist/*

    - name: Generate release SBOM
      run: |
        uv export --frozen --no-dev --no-emit-project --format requirements-txt --output-file .assurance/release-requirements.txt
        uv venv .assurance/sbom-env --python 3.14
        uv pip install --python .assurance/sbom-env/bin/python --require-hashes -r .assurance/release-requirements.txt
        uv pip install --python .assurance/sbom-env/bin/python --no-deps dist/*.whl
        uvx --from cyclonedx-bom==7.3.0 cyclonedx-py environment .assurance/sbom-env --pyproject pyproject.toml --mc-type library --output-reproducible --of JSON -o .assurance/sbom.cdx.json

    - name: Retain exact release evidence
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: release-supply-chain
        path: |
          .assurance/
          dist/
        include-hidden-files: true
        if-no-files-found: warn

    - name: Retain immutable publication payload
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: release-payload-${{ env.RELEASE_TAG }}
        path: |
          .assurance/reproducible-build.json
          .assurance/sbom.cdx.json
          .assurance/tag-verification.json
          dist/
        include-hidden-files: true
        if-no-files-found: error

    - name: Create or refresh private draft release
      run: |
        if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
          test "$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')" = true
        else
          gh release create "$RELEASE_TAG" --draft --generate-notes --verify-tag
        fi
        gh release upload "$RELEASE_TAG" dist/* --clobber
      env:
        GH_TOKEN: ${{ github.token }}

  publish:
    name: Publish Reviewed Draft
    needs: stage
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    runs-on: ubuntu-latest
    environment: pypi
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      EXPECTED_WHEEL_SHA256: ${{ inputs.expected_wheel_sha256 }}
      EXPECTED_SDIST_SHA256: ${{ inputs.expected_sdist_sha256 }}
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
    - name: Checkout exact release tag
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        fetch-depth: 0
        ref: ${{ inputs.release_tag }}
        persist-credentials: false

    - name: Revalidate exact signed remote release tag
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        APPROVED_TAGGER_EMAIL: ${{ vars.RELEASE_TAGGER_EMAIL }}
      run: |
        set -euo pipefail
        [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
        remote_oid="$(git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" | cut -f1)"
        test "$remote_oid" = "$(git rev-parse "refs/tags/$RELEASE_TAG")"
        test "$(git cat-file -t "$RELEASE_TAG")" = tag
        test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$(git rev-parse HEAD)"
        test -n "$APPROVED_TAGGER_EMAIL"
        gh api "repos/${GITHUB_REPOSITORY}/git/tags/$remote_oid" > tag-verification.json
        jq -e '.verification.verified == true' tag-verification.json >/dev/null
        test "$(jq -r '.tagger.email' tag-verification.json)" = "$APPROVED_TAGGER_EMAIL"

    - name: Download immutable publication payload
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      with:
        name: release-payload-${{ env.RELEASE_TAG }}
        path: .

    - name: Require reviewed artifact digests and private draft
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        [[ "$EXPECTED_WHEEL_SHA256" =~ ^[0-9a-f]{64}$ ]]
        [[ "$EXPECTED_SDIST_SHA256" =~ ^[0-9a-f]{64}$ ]]
        mapfile -t wheels < <(find dist -maxdepth 1 -type f -name '*.whl' -print)
        mapfile -t sdists < <(find dist -maxdepth 1 -type f -name '*.tar.gz' -print)
        test "${#wheels[@]}" -eq 1
        test "${#sdists[@]}" -eq 1
        test "$(sha256sum "${wheels[0]}" | cut -d ' ' -f1)" = "$EXPECTED_WHEEL_SHA256"
        test "$(sha256sum "${sdists[0]}" | cut -d ' ' -f1)" = "$EXPECTED_SDIST_SHA256"
        test "$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')" = true
        wheel_name="$(basename "${wheels[0]}")"
        sdist_name="$(basename "${sdists[0]}")"
        release_assets="$(gh release view "$RELEASE_TAG" --json assets)"
        test "$(jq -r --arg name "$wheel_name" '.assets[] | select(.name == $name) | .digest' <<<"$release_assets")" = "sha256:$EXPECTED_WHEEL_SHA256"
        test "$(jq -r --arg name "$sdist_name" '.assets[] | select(.name == $name) | .digest' <<<"$release_assets")" = "sha256:$EXPECTED_SDIST_SHA256"

    - name: Attest reviewed release artifacts and SBOM
      uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35
      with:
        subject-path: "dist/*"
        sbom-path: ".assurance/sbom.cdx.json"

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
      with:
        repository-url: https://test.pypi.org/legacy/
        packages-dir: dist/
        verbose: true
        print-hash: true
        skip-existing: true
        attestations: true

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
      with:
        packages-dir: dist/
        verbose: true
        print-hash: true
        attestations: true

    - name: Publish verified GitHub Release
      run: gh release edit "$RELEASE_TAG" --draft=false --latest
      env:
        GH_TOKEN: ${{ github.token }}
