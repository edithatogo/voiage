name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish"
        required: true
        type: string

permissions:
  contents: write
  id-token: write  # For trusted publishing to PyPI

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    environment: pypi
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        fetch-depth: 0
        ref: ${{ inputs.release_tag || github.ref }}
        persist-credentials: false

    - name: Validate exact signed remote release tag
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
        remote_oid="$(git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" | cut -f1)"
        test "$remote_oid" = "$(git rev-parse "refs/tags/$RELEASE_TAG")"
        test "$(git cat-file -t "$RELEASE_TAG")" = tag
        test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$(git rev-parse HEAD)"
        git verify-tag "$RELEASE_TAG"
        gh api "repos/${GITHUB_REPOSITORY}/git/tags/$remote_oid" --jq '.verification.verified' | grep -Fx true

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "0.11.29"
        enable-cache: false

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync --frozen --extra dev

    - name: Build package
      run: uv run python scripts/reproducible_build.py . --output .assurance/reproducible-build.json --dist-dir dist

    - name: Verify distributions
      run: uv run twine check dist/*

    - name: Generate release SBOM
      run: |
        uv export --frozen --no-dev --no-emit-project --format requirements-txt --output-file .assurance/release-requirements.txt
        uv venv .assurance/sbom-env --python 3.14
        uv pip install --python .assurance/sbom-env/bin/python --require-hashes -r .assurance/release-requirements.txt
        uv pip install --python .assurance/sbom-env/bin/python --no-deps dist/*.whl
        uvx --from cyclonedx-bom==7.3.0 cyclonedx-py environment .assurance/sbom-env --pyproject pyproject.toml --mc-type library --output-reproducible --of JSON -o .assurance/sbom.cdx.json

    - name: Attest release artifacts and SBOM
      uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35
      with:
        subject-path: "dist/*"
        sbom-path: ".assurance/sbom.cdx.json"

    - name: Retain exact release evidence
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: release-supply-chain
        path: |
          .assurance/
          dist/
        include-hidden-files: true
        if-no-files-found: warn

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
      with:
        repository-url: https://test.pypi.org/legacy/
        packages-dir: dist/
        verbose: true
        print-hash: true
        skip-existing: true
        attestations: true

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
      with:
        packages-dir: dist/
        verbose: true
        print-hash: true
        attestations: true

    - name: Create or update verified GitHub Release
      run: |
        gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --generate-notes --verify-tag
        gh release upload "$RELEASE_TAG" dist/* --clobber
      env:
        GH_TOKEN: ${{ github.token }}
