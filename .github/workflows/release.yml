name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish"
        required: true
        type: string

permissions:
  contents: write
  id-token: write  # For trusted publishing to PyPI

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    environment: pypi
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        fetch-depth: 0
        ref: ${{ inputs.release_tag || github.ref }}
        persist-credentials: false

    - name: Validate exact signed remote release tag
      shell: bash
      run: |
        set -euo pipefail
        [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
        git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG"
        test "$(git cat-file -t "$RELEASE_TAG")" = tag
        test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$(git rev-parse HEAD)"
        git verify-tag "$RELEASE_TAG"

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "0.11.29"
        enable-cache: false

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync --frozen --extra dev

    - name: Build package
      run: uv run python scripts/reproducible_build.py . --output .assurance/reproducible-build.json --dist-dir dist

    - name: Generate release SBOM
      run: |
        uv export --frozen --no-dev --no-emit-project --format requirements-txt --output-file .assurance/release-requirements.txt
        uvx --from cyclonedx-bom==7.3.0 cyclonedx-py requirements .assurance/release-requirements.txt --of JSON -o .assurance/sbom.cdx.json

    - name: Attest release artifacts and SBOM
      uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35
      with:
        subject-path: "dist/*"
        sbom-path: ".assurance/sbom.cdx.json"

    - name: Create verified GitHub Release
      run: gh release create "$RELEASE_TAG" dist/* --generate-notes --verify-tag
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
      with:
        repository-url: https://test.pypi.org/legacy/
        packages-dir: dist/
        verbose: true
        print-hash: true
        skip-existing: true
        attestations: true

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
      with:
        packages-dir: dist/
        verbose: true
        print-hash: true
        attestations: true
