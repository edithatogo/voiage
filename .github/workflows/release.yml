name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to validate and build"
        required: true
        type: string

permissions: {}

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-tag:
    name: Resolve immutable release tag
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
    outputs:
      tag_sha: ${{ steps.tag.outputs.tag_sha }}
    steps:
      - name: Check out repository for tag resolution
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Resolve actual remote tag to immutable commit
        id: tag
        shell: bash
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          git ls-remote --exit-code --refs origin "refs/tags/$RELEASE_TAG"
          git fetch --force --no-tags origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          tag_sha=$(git rev-parse --verify "refs/tags/$RELEASE_TAG^{commit}")
          git checkout --detach "$tag_sha"
          test "$(git rev-parse HEAD)" = "$tag_sha"
          echo "tag_sha=$tag_sha" >> "$GITHUB_OUTPUT"
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.9.18"
          enable-cache: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.10"
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: "1.85"
      - name: Install locked validation tooling
        run: uv sync --locked --extra ci
      - name: Fail closed on release version
        run: uv run --no-sync python -m voiage.versioning --release-tag "$RELEASE_TAG"

  wheels:
    name: Native wheel (${{ matrix.platform }})
    needs: resolve-tag
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    permissions:
      contents: read
    env:
      TAG_SHA: ${{ needs.resolve-tag.outputs.tag_sha }}
      VOIAGE_SOURCE_REVISION: ${{ needs.resolve-tag.outputs.tag_sha }}
      VOIAGE_SOURCE_CLEAN: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
            platform-suffix: manylinux_2_17_x86_64.manylinux2014_x86_64
            compatibility: manylinux2014
          - os: macos-14
            platform: macos-arm64
            platform-suffix: macosx_11_0_arm64
            compatibility: pypi
          - os: windows-2025
            platform: windows-x86_64
            platform-suffix: win_amd64
            compatibility: pypi
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out immutable release commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ needs.resolve-tag.outputs.tag_sha }}
          persist-credentials: false
      - name: Bind build to immutable source tree
        run: echo "VOIAGE_SOURCE_TREE_GIT_OID=$(git rev-parse 'HEAD^{tree}')" >> "$GITHUB_ENV"
      - name: Verify immutable checkout
        run: test "$(git rev-parse HEAD)" = "$TAG_SHA"
      - name: Record reproducible source epoch
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.9.18"
          enable-cache: false
      - name: Set up Python 3.10 ABI floor
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.10"
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: "1.85"
      - name: Install locked release tooling
        run: uv sync --locked --extra ci
      - name: Build native abi3 wheel
        if: runner.os != 'Linux'
        run: uv run --no-sync maturin build --locked --release --compatibility "${{ matrix.compatibility }}" --interpreter python --out dist
      - name: Build native manylinux2014 abi3 wheel
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          args: --locked --release --compatibility pypi --interpreter python3.10 --out dist
          command: build
          docker-options: -e VOIAGE_SOURCE_REVISION -e VOIAGE_SOURCE_TREE_GIT_OID -e VOIAGE_SOURCE_CLEAN -e SOURCE_DATE_EPOCH
          manylinux: "2014"
          maturin-version: v1.14.1
          rust-toolchain: "1.85"
      - name: Verify wheel tag and native module
        env:
          WHEEL_PLATFORM: ${{ matrix.platform }}
          EXPECTED_PLATFORM_SUFFIX: ${{ matrix.platform-suffix }}
        run: |
          python -c "import os; from pathlib import Path; wheel=next(Path('dist').glob('*.whl')); assert 'cp310-abi3' in wheel.name, wheel; expected=os.environ['EXPECTED_PLATFORM_SUFFIX']; platform=wheel.stem.rsplit('-', 1)[-1]; assert platform.endswith(expected), f'{os.environ[\"WHEEL_PLATFORM\"]}: {platform=} {expected=}'"
          python -c "from pathlib import Path; from zipfile import ZipFile; wheel=next(Path('dist').glob('*.whl')); assert any(name.startswith('voiage/_core.') for name in ZipFile(wheel).namelist())"
      - name: Install wheel into clean environment
        run: |
          uv venv --python 3.10 .release-wheel-venv
          uv pip install --python .release-wheel-venv dist/*.whl
          uv pip check --python .release-wheel-venv
          uv pip install --python .release-wheel-venv pytest rfc8785==0.1.4
          mkdir -p "$RUNNER_TEMP/wheel-black-box"
          cp "$GITHUB_WORKSPACE/tests/packaging/test_wheel_black_box.py" "$RUNNER_TEMP/wheel-black-box/"
      - name: Exercise wheel outside checkout
        env:
          WHEEL_VENV: ${{ github.workspace }}/.release-wheel-venv
          EXPECTED_SOURCE_REVISION: ${{ needs.resolve-tag.outputs.tag_sha }}
          EXPECTED_SOURCE_TREE_GIT_OID: ${{ env.VOIAGE_SOURCE_TREE_GIT_OID }}
          EXPECTED_PLATFORM_SUFFIX: ${{ matrix.platform-suffix }}
        run: cd "$RUNNER_TEMP/wheel-black-box" && uv run --python "$WHEEL_VENV" --no-project pytest test_wheel_black_box.py --import-mode=importlib
      - name: Record architecture manifest
        run: python -c "from pathlib import Path; wheel=next(Path('dist').glob('*.whl')); Path('dist/wheel-manifest-${{ matrix.platform }}.txt').write_text(wheel.name + '\n', encoding='utf-8')"
      - name: Upload native wheel
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: voiage-wheel-${{ matrix.platform }}
          path: |
            dist/*.whl
            dist/wheel-manifest-${{ matrix.platform }}.txt
          if-no-files-found: error
          retention-days: 7

  sdist:
    name: Source distribution contract
    needs: resolve-tag
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      TAG_SHA: ${{ needs.resolve-tag.outputs.tag_sha }}
      VOIAGE_SOURCE_REVISION: ${{ needs.resolve-tag.outputs.tag_sha }}
      VOIAGE_SOURCE_CLEAN: "true"
    steps:
      - name: Check out immutable release commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ needs.resolve-tag.outputs.tag_sha }}
          persist-credentials: false
      - name: Bind build to immutable source tree
        run: echo "VOIAGE_SOURCE_TREE_GIT_OID=$(git rev-parse 'HEAD^{tree}')" >> "$GITHUB_ENV"
      - name: Verify immutable checkout
        run: test "$(git rev-parse HEAD)" = "$TAG_SHA"
      - name: Record reproducible source epoch
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.9.18"
          enable-cache: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.10"
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: "1.85"
      - name: Install locked release tooling
        run: uv sync --locked --extra ci
      - name: Build source distribution
        run: |
          uv run --no-sync python scripts/embed_sdist_provenance.py
          uv run --no-sync maturin sdist --out dist
      - name: Extract clean source distribution
        run: |
          mkdir .sdist-source .sdist-wheel
          tar -xzf dist/*.tar.gz -C .sdist-source --strip-components=1
      - name: Build manylinux2014 wheel from clean extracted sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          args: --locked --release --compatibility pypi --interpreter python3.10 --out ../.sdist-wheel
          command: build
          docker-options: -e SOURCE_DATE_EPOCH
          manylinux: "2014"
          maturin-version: v1.14.1
          rust-toolchain: "1.85"
          working-directory: .sdist-source
      - name: Verify sdist-derived wheel tag
        run: python -c "from pathlib import Path; wheel=next(Path('.sdist-wheel').glob('*.whl')); assert 'cp310-abi3' in wheel.name, wheel; assert wheel.stem.rsplit('-', 1)[-1].endswith('manylinux_2_17_x86_64.manylinux2014_x86_64'), wheel"
      - name: Install and smoke sdist-derived wheel
        env:
          WHEEL_VENV: ${{ github.workspace }}/.sdist-wheel-venv
          EXPECTED_SOURCE_REVISION: ${{ needs.resolve-tag.outputs.tag_sha }}
          EXPECTED_SOURCE_TREE_GIT_OID: ${{ env.VOIAGE_SOURCE_TREE_GIT_OID }}
          EXPECTED_PLATFORM_SUFFIX: manylinux_2_17_x86_64.manylinux2014_x86_64
        run: |
          uv venv --python 3.10 .sdist-wheel-venv
          uv pip install --python .sdist-wheel-venv .sdist-wheel/*.whl
          uv pip check --python .sdist-wheel-venv
          uv pip install --python .sdist-wheel-venv pytest rfc8785==0.1.4
          mkdir -p "$RUNNER_TEMP/sdist-black-box"
          cp tests/packaging/test_wheel_black_box.py "$RUNNER_TEMP/sdist-black-box/"
          cd "$RUNNER_TEMP/sdist-black-box"
          uv run --python "$WHEEL_VENV" --no-project pytest test_wheel_black_box.py --import-mode=importlib
      - name: Upload source distribution
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: voiage-sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  attest:
    name: Validate and attest release artifacts
    needs: [resolve-tag, wheels, sdist]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
      TAG_SHA: ${{ needs.resolve-tag.outputs.tag_sha }}
      EXPECTED_NATIVE_ARCHITECTURES: linux-x86_64,macos-arm64,windows-x86_64
    steps:
      - name: Check out immutable release commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-tag.outputs.tag_sha }}
          persist-credentials: false
      - name: Revalidate remote tag binding
        shell: bash
        run: |
          git ls-remote --exit-code --refs origin "refs/tags/$RELEASE_TAG"
          git fetch --force --no-tags origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          test "$(git rev-parse --verify "refs/tags/$RELEASE_TAG^{commit}")" = "$TAG_SHA"
      - name: Download all release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: voiage-*
          path: dist
          merge-multiple: true
      - name: Validate complete extensible artifact set
        run: |
          release_version="${RELEASE_TAG#v}"
          export RELEASE_VERSION="$release_version"
          python -c "import os; from pathlib import Path; version=os.environ['RELEASE_VERSION']; expected=set(os.environ['EXPECTED_NATIVE_ARCHITECTURES'].split(',')); wheels=list(Path('dist').glob('*.whl')); manifests=list(Path('dist').glob('wheel-manifest-*.txt')); actual={m.stem.removeprefix('wheel-manifest-') for m in manifests}; assert actual==expected, f'expected native architectures {expected}, found {actual}'; assert len(wheels)==len(manifests)>0, f'expected one wheel per architecture manifest: {wheels=} {manifests=}'; declared={m.read_text(encoding='utf-8').strip() for m in manifests}; assert declared=={w.name for w in wheels}; assert all(f'voiage-{version}-cp310-abi3-' in w.name for w in wheels)"
          python -c "import os; from pathlib import Path; version=os.environ['RELEASE_VERSION']; sdists=list(Path('dist').glob('*.tar.gz')); assert len(sdists)==1, f'expected exactly one source distribution, found {sdists}'; assert sdists[0].name==f'voiage-{version}.tar.gz'"
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: "dist/*"
      - name: Upload attested release set
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: voiage-attested-release
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  test-pypi:
    name: Publish to TestPyPI
    needs: [resolve-tag, attest]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
      TAG_SHA: ${{ needs.resolve-tag.outputs.tag_sha }}
    steps:
      - name: Check out immutable release commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-tag.outputs.tag_sha }}
          persist-credentials: false
      - name: Download attested release set
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: voiage-attested-release
          path: dist
      - name: Revalidate remote tag binding immediately before TestPyPI
        shell: bash
        run: |
          git ls-remote --exit-code --refs origin "refs/tags/$RELEASE_TAG"
          git fetch --force --no-tags origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          test "$(git rev-parse --verify "refs/tags/$RELEASE_TAG^{commit}")" = "$TAG_SHA"
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          verbose: true
          print-hash: true
          skip-existing: true
          attestations: false

  test-pypi-smoke:
    name: Install and smoke TestPyPI release
    needs: [resolve-tag, test-pypi]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
      TAG_SHA: ${{ needs.resolve-tag.outputs.tag_sha }}
    steps:
      - name: Check out immutable release commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ needs.resolve-tag.outputs.tag_sha }}
          persist-credentials: false
      - name: Bind smoke test to immutable source tree
        run: echo "VOIAGE_SOURCE_TREE_GIT_OID=$(git rev-parse 'HEAD^{tree}')" >> "$GITHUB_ENV"
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.9.18"
          enable-cache: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.10"
      - name: Install TestPyPI artifact with bounded retry
        shell: bash
        run: |
          release_version="${RELEASE_TAG#v}"
          uv export --locked --extra ci --no-dev --no-emit-project --output-file locked-requirements.txt
          uv venv --python 3.10 .testpypi-venv
          uv pip install --python .testpypi-venv -r locked-requirements.txt
          for attempt in 1 2 3 4 5 6; do
            if uv pip install --python .testpypi-venv --no-deps --refresh-package voiage --index-url https://test.pypi.org/simple/ "voiage==$release_version"; then
              break
            fi
            if [[ "$attempt" == "6" ]]; then
              exit 1
            fi
            sleep 20
          done
          mkdir -p "$RUNNER_TEMP/testpypi-black-box"
          cp tests/packaging/test_wheel_black_box.py "$RUNNER_TEMP/testpypi-black-box/"
      - name: Smoke installed TestPyPI artifact outside checkout
        env:
          WHEEL_VENV: ${{ github.workspace }}/.testpypi-venv
          EXPECTED_SOURCE_REVISION: ${{ needs.resolve-tag.outputs.tag_sha }}
          EXPECTED_SOURCE_TREE_GIT_OID: ${{ env.VOIAGE_SOURCE_TREE_GIT_OID }}
          EXPECTED_PLATFORM_SUFFIX: manylinux_2_17_x86_64.manylinux2014_x86_64
        run: cd "$RUNNER_TEMP/testpypi-black-box" && uv run --python "$WHEEL_VENV" --no-project pytest test_wheel_black_box.py --import-mode=importlib

  pypi:
    name: Publish to PyPI
    needs: [resolve-tag, test-pypi-smoke]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: pypi
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
      TAG_SHA: ${{ needs.resolve-tag.outputs.tag_sha }}
    steps:
      - name: Check out immutable release commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-tag.outputs.tag_sha }}
          persist-credentials: false
      - name: Download attested release set
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: voiage-attested-release
          path: dist
      - name: Revalidate remote tag binding immediately before PyPI
        shell: bash
        run: |
          git ls-remote --exit-code --refs origin "refs/tags/$RELEASE_TAG"
          git fetch --force --no-tags origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          test "$(git rev-parse --verify "refs/tags/$RELEASE_TAG^{commit}")" = "$TAG_SHA"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist/
          verbose: true
          print-hash: true
          attestations: false

  github-release:
    name: Create GitHub Release
    needs: [resolve-tag, pypi]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
      TAG_SHA: ${{ needs.resolve-tag.outputs.tag_sha }}
    steps:
      - name: Check out immutable release commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-tag.outputs.tag_sha }}
          persist-credentials: false
      - name: Revalidate remote tag binding
        shell: bash
        run: |
          git ls-remote --exit-code --refs origin "refs/tags/$RELEASE_TAG"
          git fetch --force --no-tags origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          test "$(git rev-parse --verify "refs/tags/$RELEASE_TAG^{commit}")" = "$TAG_SHA"
      - name: Download attested release set
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: voiage-attested-release
          path: dist
      - name: Create GitHub Release
        run: gh release create "$RELEASE_TAG" dist/* --generate-notes --verify-tag --target "$TAG_SHA"
        env:
          GH_TOKEN: ${{ github.token }}
