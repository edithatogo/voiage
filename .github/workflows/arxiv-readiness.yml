name: arXiv Readiness

on:
  pull_request:
    paths:
      - "paper/**"
      - "scripts/build_arxiv_submission.py"
      - ".github/workflows/arxiv-readiness.yml"
  push:
    branches: [main]
    paths:
      - "paper/**"
      - "scripts/build_arxiv_submission.py"
      - ".github/workflows/arxiv-readiness.yml"
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2.2.0
        with:
          version: 1.8.25
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Install TeX compatibility tools
        run: sudo apt-get update && sudo apt-get install --yes latexmk texlive-latex-base texlive-latex-extra
      - run: uv run python scripts/build_arxiv_submission.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: voiage-arxiv-readiness
          path: build/arxiv/
