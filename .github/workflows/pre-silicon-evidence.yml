name: Pre-Silicon FPGA/ASIC Evidence

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "hardware/pre_silicon/**"
      - "scripts/pre_silicon_evidence.py"
      - "tests/test_pre_silicon_evidence_tracks.py"
      - "conductor/tracks/fpga-implementation_20260511/**"
      - "conductor/tracks/asic-implementation_20260511/**"

permissions:
  contents: read

jobs:
  manifest-smoke:
    name: Manifest Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14"

      - name: Generate probe manifests
        run: |
          python scripts/pre_silicon_evidence.py all \
            --output-root pre-silicon-evidence \
            --probe-only
          python -m json.tool pre-silicon-evidence/fpga/pre_silicon_evidence_manifest.json >/dev/null
          python -m json.tool pre-silicon-evidence/asic/pre_silicon_evidence_manifest.json >/dev/null

      - name: Upload probe manifests
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pre-silicon-probe-manifests
          path: pre-silicon-evidence/

  fpga-oss-cad-suite:
    name: FPGA OSS CAD Suite Evidence
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Set up OSS CAD Suite
        uses: YosysHQ/setup-oss-cad-suite@c7845bc0d335c8076aa22047e85972caa8a916df
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate FPGA pre-silicon evidence
        run: |
          python scripts/pre_silicon_evidence.py fpga \
            --output-root pre-silicon-evidence/fpga

      - name: Upload FPGA evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: fpga-pre-silicon-evidence
          path: pre-silicon-evidence/fpga/

  asic-openroad-docker-probe:
    name: ASIC OpenROAD/OpenLane Docker Probe
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Probe OpenLane container availability
        run: |
          docker pull ghcr.io/the-openroad-project/openlane:latest || true
          docker run --rm ghcr.io/the-openroad-project/openlane:latest openroad -version || true

      - name: Generate ASIC pre-silicon evidence manifest
        run: |
          python scripts/pre_silicon_evidence.py asic \
            --output-root pre-silicon-evidence/asic

      - name: Upload ASIC evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: asic-pre-silicon-evidence
          path: pre-silicon-evidence/asic/
