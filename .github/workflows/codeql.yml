name: "CodeQL Security Analysis"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false

    - name: Initialize CodeQL
      uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
      with:
        languages: ${{ matrix.language }}
        queries: +security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9

    - name: Fail on blocking code-scanning alerts
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        python scripts/check_code_scanning_alerts.py
        --repository "$GITHUB_REPOSITORY"
        --commit-sha "$GITHUB_SHA"
        --token "$GITHUB_TOKEN"
        --timeout-seconds 120
        --retry-attempts 4
