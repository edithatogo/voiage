name: Benchmark Tracking

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: benchmark-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-numerics-benchmark:
    name: Production Rust Numerics Benchmarks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
      with:
        toolchain: stable

    - name: Run production numerics benchmark
      run: cargo bench --manifest-path rust/Cargo.toml --locked -p voiage-numerics --bench foundational | tee rust-numerics-benchmark.txt

    - name: Validate benchmark workload contract
      run: |
        python3 - <<'PY'
        import json
        from pathlib import Path

        baseline = json.loads(Path("rust/crates/voiage-numerics/benches/foundational-baseline.json").read_text())
        observed = Path("rust-numerics-benchmark.txt").read_text().splitlines()
        measurements = {}
        for line in observed:
            if not line.startswith("benchmark="):
                continue
            fields = dict(field.split("=", 1) for field in line.split(","))
            name = fields.get("benchmark")
            if name in measurements:
                raise SystemExit(f"benchmark workload contract duplicated operation: {name}")
            try:
                elapsed_ns = int(fields["elapsed_ns"])
            except (KeyError, ValueError) as error:
                raise SystemExit(f"benchmark workload contract has invalid timing: {line!r}") from error
            if elapsed_ns < 0:
                raise SystemExit(f"benchmark workload contract has negative timing: {line!r}")
            measurements[name] = elapsed_ns

        missing = [name for name in baseline["required_operations"] if name not in measurements]
        if missing:
            raise SystemExit(f"benchmark workload contract missing operations: {missing}")

        budgets = baseline.get("regression_budgets")
        if baseline.get("regression_budget_version") != 1 or not isinstance(budgets, dict):
            raise SystemExit("native EVSI regression-budget contract is missing or unsupported")
        if budgets.get("metric") != "elapsed_ns" or budgets.get("scope") != "native_evsi_only":
            raise SystemExit("native EVSI regression-budget contract has an invalid scope or metric")
        for name, budget in budgets.get("operations", {}).items():
            if name not in measurements:
                raise SystemExit(f"native EVSI regression budget has no benchmark measurement: {name}")
            reference = budget.get("reference_elapsed_ns")
            maximum = budget.get("max_elapsed_ns")
            if not isinstance(reference, int) or not isinstance(maximum, int) or reference <= 0 or maximum < reference:
                raise SystemExit(f"native EVSI regression budget is invalid for {name}")
            if measurements[name] <= 0:
                raise SystemExit(f"native EVSI benchmark has non-positive timing for {name}")
            if measurements[name] > maximum:
                raise SystemExit(
                    f"native EVSI benchmark exceeded regression budget for {name}: "
                    f"{measurements[name]} ns > {maximum} ns"
                )
        print(json.dumps(baseline, sort_keys=True))
        PY

    - name: Upload production numerics benchmark
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: rust-numerics-foundational-benchmark
        path: rust-numerics-benchmark.txt
        retention-days: 30

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "latest"
        enable-cache: true
        cache-suffix: ${{ github.job }}-base

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: uv sync --extra ci

    - name: Run benchmarks
      run: |
        uv run pytest tests/ \
          -m "benchmark" \
          --benchmark-only \
          --benchmark-json=benchmark_results.json \
          --no-cov \
          -v
      env:
        CI: true

    - name: Upload benchmark results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: benchmark-results
        path: benchmark_results.json
        retention-days: 30

  rust-benchmark:
    name: Rust Profiling Baselines
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/rust

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable

      - name: Run the scalar CPU baseline and capture profiling data
        run: |
          mkdir -p target/profiling
          python3 - <<'PY'
          import json
          import pathlib
          import resource
          import subprocess
          import sys
          import time

          command = [
              "cargo",
              "test",
              "--locked",
              "--benches",
              "scalar_cpu_baseline",
              "--",
              "--nocapture",
          ]
          before = resource.getrusage(resource.RUSAGE_CHILDREN)
          start = time.perf_counter()
          timed = subprocess.run(
              command,
              text=True,
              capture_output=True,
              check=False,
          )
          elapsed = time.perf_counter() - start
          if timed.returncode != 0:
              print(timed.stdout, end="")
              print(timed.stderr, end="", file=sys.stderr)
          after = resource.getrusage(resource.RUSAGE_CHILDREN)
          rss_delta = after.ru_maxrss - before.ru_maxrss
          rss_kb = rss_delta // 1024 if sys.platform == "darwin" else rss_delta

          artifact = {
              "benchmark_name": "scalar_cpu_baseline",
              "metric_type": "scalar_cpu_memory_throughput",
              "workload": {
                  "seed": 42,
                  "repeats": 10000,
                  "net_benefits": [[10.0, 1.0], [2.0, 8.0]],
              },
              "observed": {
                  "wall_seconds": round(elapsed, 6),
                  "maximum_resident_set_size_kb": rss_kb,
              },
              "regression_policy": "contract-only",
              "command": command,
          }

          out = pathlib.Path("target/profiling/rust_scalar_cpu_baseline.json")
          out.write_text(json.dumps(artifact, indent=2, sort_keys=True) + "\n")
          raise SystemExit(timed.returncode)
          PY

      - name: Upload Rust scalar profiling artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: rust-scalar-cpu-baseline
          path: bindings/rust/target/profiling/rust_scalar_cpu_baseline.json
          retention-days: 30

      - name: Run the EVSI baseline and capture profiling data
        run: |
          mkdir -p target/profiling
          python3 - <<'PY'
          import json
          import pathlib
          import resource
          import subprocess
          import sys
          import time

          command = [
              "cargo",
              "test",
              "--locked",
              "--benches",
              "evsi_stochastic_baseline",
              "--",
              "--nocapture",
          ]
          repeats = 10000
          before = resource.getrusage(resource.RUSAGE_CHILDREN)
          start = time.perf_counter()
          timed = subprocess.run(
              command,
              text=True,
              capture_output=True,
              check=False,
          )
          elapsed = time.perf_counter() - start
          if timed.returncode != 0:
              print(timed.stdout, end="")
              print(timed.stderr, end="", file=sys.stderr)
          after = resource.getrusage(resource.RUSAGE_CHILDREN)
          rss_delta = after.ru_maxrss - before.ru_maxrss
          rss_kb = rss_delta // 1024 if sys.platform == "darwin" else rss_delta
          iterations_per_second = repeats / elapsed if elapsed > 0 else None

          artifact = {
              "benchmark_name": "evsi_stochastic_baseline",
              "metric_type": "evsi_stochastic_kernel",
              "workload": {
                  "analysis_id": "evsi-001",
                  "repeats": repeats,
                  "trial_design_id": "screening-trial-design-001",
                  "current_net_benefit_id": "current-net-benefit-001",
              },
              "observed": {
                  "wall_seconds": round(elapsed, 6),
                  "maximum_resident_set_size_kb": rss_kb,
                  "iterations_per_second": round(iterations_per_second, 6)
                  if iterations_per_second is not None
                  else None,
              },
              "regression_policy": "contract-only",
              "command": command,
          }

          out = pathlib.Path("target/profiling/rust_evsi_stochastic_baseline.json")
          out.write_text(json.dumps(artifact, indent=2, sort_keys=True) + "\n")
          raise SystemExit(timed.returncode)
          PY

      - name: Upload Rust EVSI profiling artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: rust-evsi-stochastic-baseline
          path: bindings/rust/target/profiling/rust_evsi_stochastic_baseline.json
          retention-days: 30
