name: Retained Bindings Release

on:
  push:
    tags:
      - "rust-v*"
      - "julia-v*"
      - "r-v*"

permissions: {}

jobs:
  rust:
    name: Publish Rust to crates.io
    if: startsWith(github.ref_name, 'rust-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          components: clippy,rustfmt
      - run: cargo fmt --all --check
      - run: cargo test --workspace --all-features --locked
      - run: cargo package --manifest-path crates/voiage-ffi/Cargo.toml --locked --allow-dirty
      - name: Publish to crates.io
        run: cargo publish --manifest-path crates/voiage-ffi/Cargo.toml --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  julia:
    name: Release Julia package
    if: startsWith(github.ref_name, 'julia-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/julia
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32
        with:
          version: "1.11"
      - run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.test()'

  r:
    name: Release R package
    if: startsWith(github.ref_name, 'r-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: r-package/voiageR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6
      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6
        with:
          extra-packages: any::rcmdcheck
      - run: R CMD build .
      - run: Rscript -e 'rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "warning")'
