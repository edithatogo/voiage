name: Polyglot Bindings Release

on:
  push:
    tags:
      - "typescript-v*"
      - "go-v*"
      - "rust-v*"
      - "julia-v*"
      - "dotnet-v*"
      - "r-v*"

permissions:
  contents: write
  id-token: write

jobs:
  typescript:
    name: Publish TypeScript to npm
    if: startsWith(github.ref_name, 'typescript-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/typescript
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm run check
      - run: npm pack --dry-run
      - name: Publish to npm
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm publish --access public
          else
            echo "NPM_TOKEN is not configured; skipping npm publish."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  go:
    name: Validate Go module release
    if: startsWith(github.ref_name, 'go-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/go
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - run: go test ./...
      - run: go vet ./...

  rust:
    name: Publish Rust to crates.io
    if: startsWith(github.ref_name, 'rust-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/rust
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo package --allow-dirty
      - name: Publish to crates.io
        run: |
          if [ -n "$CARGO_REGISTRY_TOKEN" ]; then
            cargo publish
          else
            echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish."
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  julia:
    name: Validate Julia package release
    if: startsWith(github.ref_name, 'julia-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/julia
    steps:
      - uses: actions/checkout@v5
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"
      - run: julia --project=. -e 'using Pkg; Pkg.test()'

  dotnet:
    name: Publish .NET 11 package to NuGet
    if: startsWith(github.ref_name, 'dotnet-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/dotnet
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "11.0.x"
          dotnet-quality: "preview"
      - run: dotnet build src/Voiage.Core/Voiage.Core.csproj --configuration Release
      - run: dotnet run --project tests/Voiage.Core.Tests/Voiage.Core.Tests.csproj --configuration Release
      - run: dotnet pack src/Voiage.Core/Voiage.Core.csproj --configuration Release --no-build --output nupkg
      - name: Publish to NuGet
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            dotnet nuget push "nupkg/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          else
            echo "NUGET_API_KEY is not configured; skipping NuGet publish."
          fi
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  r:
    name: Validate R package release
    if: startsWith(github.ref_name, 'r-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: r-package/voiageR
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r-package/voiageR
          extra-packages: any::rcmdcheck
      - run: R CMD build .
      - run: Rscript -e 'rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "warning")'
