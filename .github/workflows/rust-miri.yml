name: Rust Miri unsafe-boundary analysis

on:
  pull_request:
    paths:
      - ".github/workflows/rust-miri.yml"
      - "rust/**"
      - "tests/test_ci_cd_quality_gates.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/rust-miri.yml"
      - "rust/**"
      - "tests/test_ci_cd_quality_gates.py"
  schedule:
    - cron: "43 5 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: rust-miri-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-miri-unsafe-boundary:
    name: Rust Miri unsafe-boundary tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install pinned Miri toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: nightly-2026-07-01
          components: miri,rust-src
      - name: Run unsafe-boundary suites under Miri
        env:
          MIRIFLAGS: -Zmiri-strict-provenance
        run: >-
          cargo +nightly-2026-07-01 miri test
          --manifest-path rust/Cargo.toml --locked --package voiage-ffi
          --test lifecycle --test error_transport
