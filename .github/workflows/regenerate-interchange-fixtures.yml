name: Regenerate interchange fixtures

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/regenerate-interchange-fixtures.yml"

permissions:
  contents: read

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14"
      - run: uv sync --extra ci
      - run: uv run python scripts/perspective_interchange_manifest.py --write
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: perspective-interchange-fixtures
          path: specs/frontier/perspective/v1/interchange
