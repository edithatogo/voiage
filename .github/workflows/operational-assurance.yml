name: Operational Assurance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compatibility-and-coverage:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout complete comparison history
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        version: "0.11.29"
        enable-cache: true
        cache-dependency-glob: uv.lock

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.14"

    - name: Install frozen dependencies
      run: uv sync --frozen --extra ci --extra dev

    - name: Verify independent consumer matrix
      run: >-
        uv run python scripts/check_consumer_matrix.py
        --output .assurance/consumer-matrix.json

    - name: Collect full branch coverage
      run: |
        uv run coverage run --branch --source=voiage -m pytest tests/ -m "not integration and not e2e and not benchmark"
        uv run coverage json -o .assurance/coverage.json

    - name: Resolve comparison base
      id: comparison
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE: ${{ github.event.pull_request.base.sha }}
        PUSH_BASE: ${{ github.event.before }}
      run: |
        base="${PUSH_BASE}"
        if [ "${EVENT_NAME}" = pull_request ]; then base="${PR_BASE}"; fi
        if [ -z "${base}" ] || [ "${base}" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${base}^{commit}"; then
          base="HEAD^"
        fi
        echo "base=${base}" >> "$GITHUB_OUTPUT"

    - name: Enforce aggregate, critical, and changed-line coverage
      run: >-
        uv run python scripts/check_coverage_policy.py
        --coverage .assurance/coverage.json
        --base "${{ steps.comparison.outputs.base }}"
        --output .assurance/coverage-policy.json

    - name: Upload operational assurance evidence
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: operational-assurance-evidence
        if-no-files-found: error
        path: .assurance/
