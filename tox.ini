[tox]
requires =
    tox>=4.2
env_list =
    lint
    vale
    joss
    harness
    typecheck
    docs
    frontier-contract
    version-sync
    py312
    py313
    py314
    min_versions
    max_versions
    coverage_report
skip_missing_interpreters = true

[testenv]
description = Run pytest tests with {envname}
# Build the test wheel directly from the authenticated checkout. The dedicated
# release contract separately rebuilds the sdist with its injected immutable
# source identity; a generic tox-created archive cannot carry that identity.
package = wheel
deps =
    .[ci]
    jsonschema>=4
set_env =
    MPLBACKEND = Agg
commands =
    pytest --no-cov {posargs} # Pass positional arguments to pytest (e.g., for specific test files)

[testenv:lint]
description = Run linters and formatters
skip_install = true
deps =
    bandit<2.0,>=1.7
    ruff<1.0,>=0.9
commands =
    ruff check voiage tests --fix --exit-non-zero-on-fix
    ruff format voiage tests --check
    bandit -r voiage -s B101,B110,B405,B314 -c pyproject.toml

[testenv:vale]
description = Run the repository prose linter
skip_install = true
allowlist_externals =
    bash
commands =
    bash scripts/vale_prose.sh

[testenv:joss]
description = Validate the JOSS manuscript and submission package
skip_install = true
commands =
    python scripts/validate_joss.py
    pytest tests/test_joss_readiness.py --no-cov -q

[testenv:harness]
description = Run repository quality and workflow security harness
skip_install = true
deps =
    .[ci]
commands =
    python scripts/repo_harness.py
    pytest tests/test_repo_harness.py --no-cov -q

[testenv:typecheck]
description = Run static type checking with ty
skip_install = true
deps =
    matplotlib>=3.11.1
    numpy>=2.5.1
    pandas>=3.0.3
    scikit-learn>=1.9.0
    seaborn>=0.13.2
    statsmodels>=0.14.6
    ty<1.0,>=0.0.1
    typer>=0.27.0
    types-setuptools
    xarray>=2026.7.0
commands =
    ty check voiage --python-version=3.14 --ignore invalid-argument-type --ignore invalid-assignment --ignore unresolved-attribute --ignore unresolved-import --ignore no-matching-overload --ignore unsupported-operator --ignore call-non-callable --ignore not-iterable --ignore not-subscriptable --ignore invalid-return-type --ignore invalid-method-override --ignore unused-type-ignore-comment --ignore redundant-cast {posargs}

[testenv:docs]
description = Check and build the Astro/Starlight documentation site
skip_install = true
changedir = docs/astro-site
allowlist_externals = pnpm
commands =
    python ../../scripts/validate_astro_docs.py ../..
    pnpm install --frozen-lockfile
    pnpm run check
    pnpm run build

[testenv:frontier-contract]
commands =
    python scripts/validate_frontier_contract.py
base = frontier-contract-base

[testenv:version-sync]
description = Validate canonical version synchronization across package manifests
skip_install = true
deps =
    .[ci]
commands =
    python scripts/validate_version_sync.py

[testenv:min_versions]
description = Test with minimum dependency versions
base_python = python3.12
deps =
    .[ci]
    jsonschema>=4
    numpy<3,>=2.2.6
    pandas<3,>=1.3
    scipy<1.17,>=1.16.3
commands =
    pytest --no-cov {posargs}

[testenv:max_versions]
description = Test with maximum dependency versions
deps =
    .[ci]
    jsonschema>=4
    numpy<3,>=2.2.6
    pandas<3,>=1.3
    scikit-learn<2,>=1.9.0
    scipy<1.17,>=1.16.3
commands =
    pytest --no-cov {posargs}

[testenv:coverage_report]
description = Generate and check code coverage report
deps =
    .[ci]
commands =
    pytest tests/ --cov=voiage --cov-config=pyproject.toml --cov-report=term-missing --cov-report=xml --cov-report=html --cov-fail-under=90 # Generate and verify coverage in the same environment as local development
allowlist_externals =
    uv

[frontier-contract-base]
description = Validate the frontier VOI registry and family manifests
skip_install = true

[testenv:safety]
description = Run safety check for dependency vulnerabilities
deps =
    safety>=2.3
    pip-tools>=7.0
allowlist_externals =
    rm
commands =
    pip-compile --generate-hashes pyproject.toml --output-file=requirements-security.txt
    safety check -r requirements-security.txt
    rm requirements-security.txt

[gh-actions]
python =
    3.12: py312
    3.13: py313
    3.14: py314
