[tox]
requires =
    tox>=4.2
env_list =
    py{312,311,310}
    min_versions
    max_versions
    lint
    typecheck
    docs
    coverage_report
    frontier-contract
skip_missing_interpreters = true

[testenv]
description = Run pytest tests with {envname}
deps =
    .[dev,plotting,deep_learning]
    hypothesis>=6
    numpy>=1.20
    pandas>=1.3
    pytest>=7
    pytest-benchmark>=4.0
    pytest-cov>=3
    scikit-learn>=1.0 # For EVPPI tests
commands =
    pytest {posargs} # Pass positional arguments to pytest (e.g., for specific test files)

[testenv:min_versions]
description = Test with minimum dependency versions
basepython = python3.10
deps =
    .[dev,plotting,deep_learning]
    hypothesis>=6.0,<7.0
    numpy>=1.20,<1.21
    pandas>=1.3,<1.4
    pytest>=7.0,<8.0
    pytest-cov>=3.0,<4.0
    scikit-learn>=1.0,<1.1
    scipy>=1.7,<1.8
commands =
    pytest {posargs}

[testenv:max_versions]
description = Test with maximum dependency versions
deps =
    .[dev,plotting,deep_learning]
    hypothesis>=6.0,<7.0
    numpy>=1.26,<2.0
    pandas>=2.2,<3.0
    pytest>=7.0,<9.0
    pytest-cov>=3.0,<6.0
    scikit-learn>=1.4,<2.0
    scipy>=1.12,<1.15
commands =
    pytest {posargs}

[testenv:lint]
description = Run linters and formatters
skip_install = true
deps =
    ruff>=0.9.0,<1.0
    bandit>=1.7,<2.0
commands =
    ruff check voiage tests --fix --exit-non-zero-on-fix
    ruff format voiage tests --check
    bandit -r voiage -s B101,B110,B405,B314 -c pyproject.toml

[testenv:typecheck]
description = Run static type checking with ty
skip_install = true
deps =
    ty>=0.0.1,<1.0
    matplotlib>=3.4
    numpy>=1.20
    pandas>=1.3
    scikit-learn>=1
    seaborn>=0.11
    statsmodels>=0.13
    typer>=0.9
    types-setuptools
    xarray>=0.19
commands =
    ty check voiage --python-version=3.10 --ignore invalid-argument-type --ignore invalid-assignment --ignore unresolved-attribute --ignore unresolved-import --ignore no-matching-overload --ignore unsupported-operator --ignore call-non-callable --ignore not-iterable --ignore not-subscriptable --ignore invalid-return-type --ignore invalid-method-override --ignore unused-type-ignore-comment --ignore redundant-cast {posargs}

[testenv:docs]
description = Build Sphinx documentation
deps =
    .[dev,plotting,deep_learning]
    sphinx>=7
    sphinx-autodoc-typehints>=1.12
    sphinx-rtd-theme>=1
commands =
    sphinx-build -W -b html docs docs/_build/html {posargs} # -W: turn warnings into errors

[testenv:coverage_report]
description = Generate and check code coverage report
deps =
    coverage>=7.0 # pytest-cov uses coverage.py
allowlist_externals =
    uv
commands =
    uv run pytest tests/ --cov=voiage --cov-report=term-missing --cov-report=xml --cov-report=html --cov-fail-under=90 # Generate and verify coverage in the same environment as local development

[testenv:frontier-contract]
base = frontier-contract-base
commands =
    python scripts/validate_frontier_contract.py

[frontier-contract-base]
description = Validate the frontier VOI registry and family manifests
skip_install = true

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
